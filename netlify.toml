# netlify.toml — R. Scott Echols CV Chatbot
# robertoscottecholscv.netlify.app
# Architecture: pure static site (public/) + Deno Edge Functions (/api/*)
# NO Vite build, NO npm run build, NO dist/ — site is static HTML in public/
# FastAPI (Cloud Run) is called SERVER-SIDE from edge functions, not proxied here.
#
# Required env vars → Netlify Dashboard → Site Settings → Environment Variables:
#   ANTHROPIC_API_KEY      Claude Opus 4.6 (chat.ts edge function)
#   BUSINESS_ACCESS_KEY    Business tier unlock passphrase
#   GEMINI_API_KEY         Gemini Embedding 2 (embed.ts edge function)
#   VECTOR_ENGINE_URL      (optional) Cloud Run retrieval URL, enables live RAG
#                          e.g. https://rse-retrieval-abc123-uc.a.run.app
#
# NOTE: VITE_API_BASE_URL is NOT needed — /api/* routes are handled by edge functions

[build]
  publish = "public"
  command = ""

# ── Edge Functions (Deno — zero cold-start at CDN edge) ───────────────────────
[[edge_functions]]
  path = "/api/chat"
  function = "chat"

[[edge_functions]]
  path = "/api/embed"
  function = "embed"

[[edge_functions]]
  path = "/api/verify-access"
  function = "verify-access"

# ── SPA fallback ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://esm.sh https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.cdnfonts.com; font-src 'self' https://fonts.gstatic.com https://fonts.cdnfonts.com; img-src 'self' data: blob:; connect-src 'self' https://*.netlify.app https://*.run.app; frame-ancestors 'none';"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Access-Key"
    X-Rate-Limit-Policy = "20rpm-public-100rpm-business"
