# R. Scott Echols CV — Netlify Configuration
# FOR THE COMMONS GOOD — clean Netlify config pattern for WSP001 repos
#
# Architecture: pure static site (public/) + Deno Edge Functions (/api/*)
# No Vite/Node build step — site is authored directly in public/index.html
# The FastAPI embed_engine (Cloud Run) is server-side only — NOT proxied here
#
# Environment variables required in Netlify Dashboard → Site Settings → Env Vars:
#   ANTHROPIC_API_KEY      — Claude Opus 4.6 (used by chat.ts edge function)
#   BUSINESS_ACCESS_KEY    — Secret passphrase for business tier access gate
#   GEMINI_API_KEY         — Gemini Embedding 2 (used by embed.ts edge function)
#   VECTOR_ENGINE_URL      — (optional) Cloud Run retrieval API, enables live RAG
#                            e.g. https://rse-retrieval-abc123-uc.a.run.app

[build]
  publish = "public"
  command = ""
  # NOTE: embed_engine.py --from-manifest is a LOCAL pre-ingest step (requires
  # GEMINI_API_KEY + Python 3.13 + chromadb). Run it manually before deploy.
  # It is NOT part of the Netlify build — ChromaDB runs on Cloud Run, not here.

# ── Edge Functions ─────────────────────────────────────────────────────────────
# All three edge functions are Deno — zero cold-start at CDN edge.
# Source: netlify/edge-functions/

[[edge_functions]]
  path = "/api/chat"
  function = "chat"

[[edge_functions]]
  path = "/api/embed"
  function = "embed"

[[edge_functions]]
  path = "/api/verify-access"
  function = "verify-access"

# ── SPA fallback ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://esm.sh https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.cdnfonts.com; font-src 'self' https://fonts.gstatic.com https://fonts.cdnfonts.com; img-src 'self' data: blob:; connect-src 'self' https://*.netlify.app https://*.run.app; frame-ancestors 'none';"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Access-Key"
    X-Rate-Limit-Policy = "20rpm-public-100rpm-business"
