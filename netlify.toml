# ─────────────────────────────────────────────────────────────────────────────
# R. Scott Echols CV — Netlify Configuration
# Includes: Edge Functions, security headers, SPA redirect, build settings
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish = "."
  command = "echo 'Static site — no build step required'"

# Edge Functions directory
[build.environment]
  NODE_VERSION = "20"
  DENO_VERSION = "1.40.0"

# ─── Edge Functions ───────────────────────────────────────────────────────────
# chat, embed, and verify-access are served from /api/*
# These run at the CDN edge (Deno runtime, zero cold start)

[[edge_functions]]
  path = "/api/chat"
  function = "chat"

[[edge_functions]]
  path = "/api/embed"
  function = "embed"

[[edge_functions]]
  path = "/api/verify-access"
  function = "verify-access"

# ─── SPA fallback redirect ───────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = { Role = [""] }

# ─── Security headers ────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# API endpoints — prevent caching, add CORS
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Access-Key"

# Static assets — aggressive cache
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Rate Limiting (Netlify Pro/Business) ─────────────────────────────────────
# Uncomment and configure these in Netlify UI → Security → Rate Limiting
# Recommended: limit /api/chat to 10 req/min per IP
# Recommended: limit /api/embed to 5 req/min per IP (business tier)
