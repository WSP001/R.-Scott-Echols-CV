# .github/workflows/refresh-gh-context.yml
# ─────────────────────────────────────────────────────────────
# COPY THIS FILE TO:  C:\WSP001\R.-Scott-Echols-CV\.github\workflows\refresh-gh-context.yml
# ─────────────────────────────────────────────────────────────
# PURPOSE:
#   Runs every morning at 6 AM UTC and on every push to main.
#   Uses GitHub CLI to pull the live repo list from WSP001 org,
#   writes it as a clean markdown file, commits it back to the
#   repo so the embed_engine.py can re-ingest it nightly.
#
#   Result: the CV chatbot ALWAYS knows Scott's current live
#   GitHub projects — no manual update ever needed again.
#
# IDENTITY RULE ENFORCED IN THIS FILE:
#   SirTrav = personal  |  SeaTrace = business  |  Sir James = creative
#   Labels are applied automatically to every repo in the output.
# ─────────────────────────────────────────────────────────────

name: Refresh GitHub Repo Context

on:
  schedule:
    # Every day at 6:00 AM UTC (2 AM Eastern, 11 PM Pacific)
    - cron: '0 6 * * *'

  push:
    branches: [ main ]
    paths:
      # Only re-run if something in KB or workflows changed
      - 'knowledge_base/**'
      - '.github/workflows/refresh-gh-context.yml'

  # Manual trigger — run anytime from GitHub Actions tab
  workflow_dispatch:
    inputs:
      force_embed:
        description: 'Force re-embed even if file unchanged'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write   # needed to commit the generated file back

jobs:
  refresh-github-context:
    name: Pull WSP001 repos → generate KB markdown
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Create KB target directory if missing ──────────────
      - name: Ensure KB directories exist
        run: |
          mkdir -p knowledge_base/public/cv
          mkdir -p knowledge_base/public/projects

      # ── 3. Generate github_repos_live.md ─────────────────────
      #    Pulls all repos from WSP001 + World-Seafood-Producers
      #    and formats them into embedding-ready markdown with
      #    identity labels (SirTrav / SeaTrace / Sir James / WSP).
      - name: Generate github_repos_live.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > knowledge_base/public/cv/github_repos_live.md << 'HEADER'
          # RSE GitHub Repository Context — Live
          <!-- partition: cv_projects | access_tier: public | auto-generated: true -->
          <!-- generated by: .github/workflows/refresh-gh-context.yml -->
          <!-- IDENTITY RULE: SirTrav=personal | SeaTrace=business | SirJames=creative -->
          <!-- DO NOT EDIT MANUALLY — this file is overwritten nightly -->

          **Owner:** R. Scott Echols (GitHub: WSP001 / World-Seafood-Producers)
          **Last refreshed:** $(date -u +"%Y-%m-%d %H:%M UTC")

          ---

          ## IDENTITY KEY

          | Tag | Meaning |
          |-----|---------|
          | [PERSONAL] | SirTrav identity — Scott's personal projects |
          | [BUSINESS] | SeaTrace / World Seafood Producers — commercial |
          | [CREATIVE] | Sir James Adventures — children's book series |
          | [LEGACY]   | Heritage / family / sports history |
          | [TOOLS]    | Tech experiments, AI tools, frameworks |
          | [CV]       | This CV site and knowledge base |

          ---

          ## WSP001 REPOSITORIES

          HEADER

          # Pull WSP001 repos with descriptions
          gh repo list WSP001 --limit 100 \
            --json name,description,url,updatedAt,isPrivate,primaryLanguage \
            | jq -r '.[] |
              "### " + .name + "\n" +
              "**URL:** " + .url + "  \n" +
              "**Updated:** " + .updatedAt[:10] + "  \n" +
              "**Language:** " + (.primaryLanguage.name // "—") + "  \n" +
              "**Description:** " + (.description // "No description provided") + "  \n" +
              "**Private:** " + (if .isPrivate then "Yes" else "No (public)" end) + "\n"
            ' >> knowledge_base/public/cv/github_repos_live.md

          echo "" >> knowledge_base/public/cv/github_repos_live.md
          echo "---" >> knowledge_base/public/cv/github_repos_live.md
          echo "" >> knowledge_base/public/cv/github_repos_live.md
          echo "## WORLD-SEAFOOD-PRODUCERS ORG REPOSITORIES" >> knowledge_base/public/cv/github_repos_live.md
          echo "" >> knowledge_base/public/cv/github_repos_live.md

          # Pull World-Seafood-Producers org repos
          gh repo list World-Seafood-Producers --limit 50 \
            --json name,description,url,updatedAt,isPrivate,primaryLanguage \
            | jq -r '.[] |
              "### " + .name + "\n" +
              "**URL:** " + .url + "  \n" +
              "**Updated:** " + .updatedAt[:10] + "  \n" +
              "**Language:** " + (.primaryLanguage.name // "—") + "  \n" +
              "**Description:** " + (.description // "No description provided") + "\n"
            ' >> knowledge_base/public/cv/github_repos_live.md || echo "(No World-Seafood-Producers repos accessible with current token)" >> knowledge_base/public/cv/github_repos_live.md

          # ── Append identity map at the bottom ─────────────────
          cat >> knowledge_base/public/cv/github_repos_live.md << 'FOOTER'

          ---

          ## IDENTITY MAP — REPO CLASSIFICATION

          | Repo | Identity | Live URL |
          |------|----------|----------|
          | SirJamesAdventures | [CREATIVE] Sir James Adventures Book001 | https://sirjamesadventure2024.netlify.app |
          | SirJamesAdventures001 | [CREATIVE] Sir James Adventures dev | — |
          | SirJamesAdventures003 | [CREATIVE] Sir James Adventures Book003 | — |
          | SirJames-A2A-Studio | [CREATIVE] Sir James A2A orchestration | — |
          | SirTrav-A2A-Studio | [PERSONAL] SirTrav personal A2A studio | — |
          | Sir-TRAV-scott | [PERSONAL] SirTrav personal identity | — |
          | SeaTrace002 | [BUSINESS] SeaTrace marine intelligence | https://seatrace.worldseafoodproducers.com |
          | SeaTrace003 | [BUSINESS] SeaTrace v3 | — |
          | SeaTrace-ODOO | [BUSINESS] SeaTrace ERP integration | — |
          | R.-Scott-Echols-CV | [CV] CV chatbot site | https://robertoscottecholscv.netlify.app |
          | WSP2agent | [BUSINESS] WSP AI agent framework | — |
          | WAFC-Business | [BUSINESS] WAFC business plans | — |
          | DCHS-Football- | [LEGACY] Dodge County HS Football legacy | — |
          | MY-JAEBELLE-WEDDING | [LEGACY] Family — Jaebelle wedding | — |
          | chatbot | [TOOLS] Standalone chatbot experiment | — |
          | ROBORTO-DBA-WSP | [TOOLS] Database agent | — |

          ---

          ## CHATBOT ANSWER CUES — REPO QUESTIONS

          **Q: What GitHub repos does Scott have?**
          A: Scott has 35+ repositories across WSP001 and World-Seafood-Producers GitHub orgs. Key ones: SeaTrace002 (business marine intelligence platform), SirJamesAdventures (personal creative — children's interactive book series at sirjamesadventure2024.netlify.app), SirTrav-A2A-Studio (personal A2A orchestration), R.-Scott-Echols-CV (this CV chatbot site), WSP2agent, and many more. See full list above.

          **Q: What is SirTrav?**
          A: SirTrav is R. Scott Echols' personal identity and studio. It is completely separate from SeaTrace (the business). SirTrav repos: SirTrav-A2A-Studio, Sir-TRAV-scott. SirTrav is never to be conflated with SeaTrace.

          **Q: What is SeaTrace?**
          A: SeaTrace is the commercial marine intelligence platform built by World Seafood Producers (WSP, est. 1988). It implements Scott's four-pillar fisheries traceability framework. Live at seatrace.worldseafoodproducers.com. SeaTrace repos: SeaTrace002, SeaTrace003, SeaTrace-ODOO.

          **Q: What is Sir James Adventures?**
          A: Sir James Adventures is an AI-illustrated interactive children's book series created by Scott for his grandson. Book001 is live at sirjamesadventure2024.netlify.app with 80 scenes across 10 chapters. Book002 is in production. Educational theme: history as it applies today — kids learn while having fun alongside parents. Personal creative project, not SeaTrace business.

          FOOTER

          echo "✅ github_repos_live.md generated — $(wc -l < knowledge_base/public/cv/github_repos_live.md) lines"

      # ── 4. Commit the generated file back to main ─────────────
      - name: Commit github_repos_live.md if changed
        run: |
          git config user.name  "WSP001-Bot"
          git config user.email "bot@worldseafoodproducers.com"
          git add knowledge_base/public/cv/github_repos_live.md

          # Only commit if there's actually a change
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to github_repos_live.md — skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "auto: refresh GitHub repo context — ${TIMESTAMP} [skip ci]"
            git push origin main
            echo "✅ Committed and pushed github_repos_live.md"
          fi

      # ── 5. Trigger embed re-ingest (optional — uncomment when embed_engine is wired) ──
      # - name: Re-ingest new sources into vector DB
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      #     GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      #   run: |
      #     pip install -r requirements.txt --quiet
      #     python scripts/embed_engine.py \
      #       --partition cv_projects \
      #       --source knowledge_base/public/cv/github_repos_live.md \
      #       --chunk-by "### "
      #     echo "✅ Re-ingest complete"

      # ── 6. Post summary to Actions log ───────────────────────
      - name: Summary
        run: |
          echo "## ✅ GitHub Context Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| File | \`knowledge_base/public/cv/github_repos_live.md\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | $(wc -l < knowledge_base/public/cv/github_repos_live.md) |" >> $GITHUB_STEP_SUMMARY
          echo "| Run at | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Next scheduled run | Tomorrow 06:00 UTC |" >> $GITHUB_STEP_SUMMARY
